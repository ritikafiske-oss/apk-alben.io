version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: alben-app-local
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - ..:/app
      - /app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: pnpm run start:dev
