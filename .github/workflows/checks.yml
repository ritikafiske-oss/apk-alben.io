name: Checks

on:
  pull_request:
    branches: [ "dev", "main" ]

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Check Prettier
      run: pnpm run format:check

    - name: Lint
      run: pnpm run lint

    - name: Build
      run: pnpm run build
